<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Endearing Correspondence: Adventure Edition</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- SCREEN: LOBBY -->
<div id="screen-lobby" class="screen active">
  <div class="lobby-wrap">
    <div class="title-block">
      <div class="title-rune">ᚺ</div>
      <h1>Endearing Correspondence</h1>
      <p class="subtitle">Adventure Edition</p>
    </div>
    <div class="lobby-card">
      <input id="player-name" type="text" placeholder="Your name" maxlength="16" autocomplete="off" spellcheck="false">
      <button class="btn-gold" id="btn-create">Host a Game</button>
      <div class="divider"><span>or</span></div>
      <div class="join-row">
        <input id="room-code" type="text" placeholder="Room code" maxlength="4" autocomplete="off" spellcheck="false" style="text-transform:uppercase;letter-spacing:3px">
        <button class="btn-stone" id="btn-join">Join</button>
      </div>
      <div id="lobby-error" class="error-msg"></div>
    </div>
    <button class="btn-text" id="btn-rules-lobby">View card guide</button>

  </div>
</div>

<!-- SCREEN: WAITING ROOM -->
<div id="screen-waiting" class="screen">
  <div class="waiting-wrap">
    <div class="room-code-display">
      <span class="room-code-label">Room Code</span>
      <span id="display-code" class="room-code-big">----</span>
      <button class="btn-copy" id="btn-copy-code">Copy code</button>
    </div>
    <div class="waiting-players" id="waiting-players"></div>
    <p class="waiting-hint">Share the code or link with friends</p>
    <button class="btn-gold" id="btn-start" style="display:none">Start Game</button>
    <p id="waiting-status" class="waiting-status">Waiting for host to start…</p>
    <button class="btn-stone" id="btn-quit-lobby" style="margin-top:8px">Leave Room</button>
  </div>
</div>

<!-- SCREEN: GAME -->
<div id="screen-game" class="screen">
  <!-- TOP BAR -->
  <div class="topbar">
    <span id="g-round" class="topbar-round">Round 1</span>
    <span id="g-turn" class="topbar-turn"></span>
    <span id="g-deck" class="topbar-deck">🂠 12</span>
    <button id="btn-quit-game" class="topbar-quit">✕ Quit</button>
  </div>

  <!-- OPPONENTS -->
  <div id="opponents-row" class="opponents-row"></div>

  <!-- MY HAND -->
  <div class="hand-section">
    <div class="hand-label" id="hand-label">Your hand</div>
    <div id="my-hand" class="my-hand"></div>
  </div>

  <!-- ACTION PANEL -->
  <div id="action-panel" class="action-panel">
    <div id="action-content" class="action-content">
      <p class="action-idle">Tap a card to play it</p>
    </div>
  </div>

  <!-- CHAT FAB -->
  <button id="btn-chat-fab" class="chat-fab" aria-label="Open chat">💬</button>
  <!-- LOG FAB -->
  <button id="btn-log-fab" class="log-fab" aria-label="Open play log">📜</button>
  <!-- GUIDE FAB -->
  <button id="btn-guide-fab" class="guide-fab" aria-label="Open card guide">📖</button>
</div>

<!-- LOG DRAWER -->
<div id="log-drawer" class="log-drawer">
  <div class="chat-drawer-inner">
    <div class="chat-drawer-header">
      <span>Play by Play</span>
      <button class="chat-close-btn" id="btn-log-close">✕</button>
    </div>
    <div id="game-log" class="chat-messages"></div>
  </div>
</div>
<div id="log-backdrop" class="chat-backdrop"></div>

<!-- CHAT DRAWER (outside game screen, always in DOM) -->
<div id="chat-drawer" class="chat-drawer">
  <div class="chat-drawer-inner">
    <div class="chat-drawer-header">
      <span>Chat</span>
      <button class="chat-close-btn" id="btn-chat-close">✕</button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-row">
      <input id="chat-input" type="text" placeholder="Say something…" maxlength="120" autocomplete="off">
      <button id="btn-chat-send" class="btn-chat-send">Send</button>
    </div>
  </div>
</div>
<div id="chat-backdrop" class="chat-backdrop"></div>

<!-- SCREEN: ROUND END -->
<div id="screen-round-end" class="screen">
  <div class="round-end-wrap">
    <div id="re-title" class="re-title"></div>
    <div id="re-results" class="re-results"></div>
    <div id="re-log" class="re-log"></div>
    <button class="btn-gold" id="btn-next-round" style="display:none">Next Round</button>
    <p id="re-waiting" class="waiting-status" style="display:none">Waiting for host…</p>
    <button class="btn-secondary" id="btn-quit-round">✕ Quit Game</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div id="modal-title" class="modal-title"></div>
    <div id="modal-body" class="modal-body"></div>
    <div id="modal-btns" class="modal-btns"></div>
  </div>
</div>

<!-- CARD GUIDE MODAL -->
<div id="guide-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box guide-box">
    <div class="modal-title">Card Guide</div>
    <div class="guide-cards" id="guide-cards"></div>
    <div class="modal-btns"><button class="modal-btn" onclick="closeGuide()">Close</button></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
